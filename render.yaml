services:
  - type: web
    name: hostly-backend
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: hostly-frontend
    env: static
    region: oregon
    rootDir: frontend
    buildCommand: bun install && bun run build
    staticPublishPath: dist/client
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
