services:
  - type: web
    name: vstay-backend
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: vstay-frontend
    env: node
    region: oregon
    rootDir: frontend
    buildCommand: bun install && bun run build
    startCommand: npx vite preview --host 0.0.0.0 --port $PORT
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: vstay-backend
          property: host
        transformation: https://{value}
